<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Gold Price</title>

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:white; text-align:center; }

header { background:linear-gradient(135deg,#bfa43f,#f7d976); color:#000; padding:30px; }

.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:30px; }

.card {
  background:#161616;
  border:1px solid gold;
  padding:20px;
  border-radius:10px;
  width:170px;
}

.price { font-size:22px; color:gold; margin-top:10px; }

#chart { margin:40px auto; width:95%; max-width:900px; }

footer { border-top:1px solid gold; padding:20px; color:#aaa; }
</style>
</head>

<body>

<header>
  <h1>Live Gold Price</h1>
</header>

<div class="grid" id="grid">Loading...</div>

<div id="chart">
  <div id="tradingview_chart"></div>
</div>

<footer>© 2026 GoldWatch</footer>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>

const currencies = [
  {code:'USD', symbol:'$', rate:1},
  {code:'PKR', symbol:'Rs', rate:278},
  {code:'EUR', symbol:'€', rate:0.92}
];

let goldPrice = 3200; // default safe price

async function loadGold() {
  try {
    let res = await fetch("https://api.metals.live/v1/spot/gold");

    if(res.ok){
      let data = await res.json();
      if(data && data[0] && data[0].gold){
        goldPrice = data[0].gold;
      }
    }
  } catch(e) {
    console.log("API failed, using fallback");
  }

  renderPrices();
}

function renderPrices(){
  let html = '';

  currencies.forEach(c => {
    let price = goldPrice * c.rate;

    html += `
      <div class="card">
        <div>${c.code} / oz</div>
        <div class="price">${c.symbol}${price.toFixed(2)}</div>
      </div>
    `;
  });

  document.getElementById("grid").innerHTML = html;
}

// SAFE chart load
function loadChart(){
  if(typeof TradingView !== "undefined"){
    new TradingView.widget({
      symbol: "OANDA:XAUUSD",
      interval: "D",
      container_id: "tradingview_chart",
      width: "100%",
      height: 400,
      theme: "dark"
    });
  }
}

// RUN
window.onload = function(){
  loadGold();
  loadChart();
  setInterval(loadGold, 60000);
};

</script>

</body>
</html>
