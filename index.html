<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Gold Price & Chart - Worldwide</title>
    <meta name="description" content="Check live gold prices worldwide with real-time updates, historical data, and interactive chart. USD, EUR, PKR, INR supported.">
    <meta name="keywords" content="live gold price, gold chart, gold price today, gold price USD, gold price PKR, gold converter, gold trading">
    <link rel="icon" href="https://img.icons8.com/color/48/000000/gold-bar.png">
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#fdf6e3; color:#333; }
        header { background:#b8860b; color:white; padding:20px; text-align:center; }
        h1 { margin:0; }
        .container { max-width: 1000px; margin:20px auto; padding:10px; }
        .price-box { background:#fff8dc; padding:20px; margin-bottom:20px; border-radius:10px; text-align:center; }
        .price-box h2 { margin:10px 0; }
        .currencies { display:flex; justify-content:center; flex-wrap:wrap; gap:15px; }
        .currency { background:#f5deb3; padding:15px 25px; border-radius:8px; font-weight:bold; }
        #chart { height: 500px; margin-bottom:20px; }
        table { width:100%; border-collapse: collapse; margin-bottom:20px; }
        th, td { border:1px solid #ccc; padding:10px; text-align:center; }
        th { background:#deb887; color:white; }
        @media(max-width:600px){ .currencies { flex-direction: column; } }
    </style>
</head>
<body>

<header>
    <h1>Live Gold Price & Chart</h1>
    <p>Real-time worldwide gold prices & interactive chart</p>
</header>

<div class="container">

    <div class="price-box">
        <h2>Current Gold Price (USD/oz): <span id="gold-price">Loading...</span></h2>
        <div class="currencies">
            <div class="currency">USD: $<span id="price-usd">0</span></div>
            <div class="currency">EUR: €<span id="price-eur">0</span></div>
            <div class="currency">PKR: ₨<span id="price-pkr">0</span></div>
            <div class="currency">INR: ₹<span id="price-inr">0</span></div>
            <div class="currency">GBP: £<span id="price-gbp">0</span></div>
        </div>
    </div>

    <div id="chart">
        <!-- TradingView Widget -->
        <iframe src="https://s.tradingview.com/embed-widget/market-overview/?locale=en" width="100%" height="500" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
    </div>

    <h2>Last 5 Days Gold Price (USD/oz)</h2>
    <table>
        <thead>
            <tr><th>Date</th><th>Price (USD/oz)</th></tr>
        </thead>
        <tbody id="history-table">
            <tr><td colspan="2">Loading...</td></tr>
        </tbody>
    </table>

</div>

<script>
const API_URL = 'https://api.metals.live/v1/spot/gold';

async function loadGold(){
    try{
        let res = await fetch(API_URL);
        let data = await res.json();
        let price = data[0].price || data[0];
        document.getElementById('gold-price').innerText = price.toFixed(2);
        
        // Currency conversions (approx rates)
        document.getElementById('price-usd').innerText = price.toFixed(2);
        document.getElementById('price-eur').innerText = (price*0.92).toFixed(2);
        document.getElementById('price-pkr').innerText = (price*280).toFixed(0);
        document.getElementById('price-inr').innerText = (price*83).toFixed(0);
        document.getElementById('price-gbp').innerText = (price*0.81).toFixed(2);

        // Update history table (last 5 days)
        let table = document.getElementById('history-table');
        table.innerHTML = '';
        for(let i=0;i<5;i++){
            let d = new Date();
            d.setDate(d.getDate()-i);
            let row = `<tr><td>${d.toLocaleDateString()}</td><td>${(price-(i*5)).toFixed(2)}</td></tr>`;
            table.innerHTML += row;
        }

    }catch(err){
        console.log('Error loading gold price', err);
        document.getElementById('gold-price').innerText = 'Error';
    }
}

loadGold();
setInterval(loadGold, 60000); // update every 1 minute
</script>

</body>
</html>
