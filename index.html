<script>
async function fetchPrices() {
  const priceGrid = document.getElementById('price-grid');
  const lastUpdate = document.getElementById('last-update');

  try {
    // Sample free API (XAU to USD, EUR, GBP, INR)
    const response = await fetch('https://api.metals.live/v1/spot/gold');
    const data = await response.json();

    // Clear previous cards
    priceGrid.innerHTML = '';

    // Example: data[0] = { price: 1960, currency: "USD" }
    const currencies = ['USD', 'EUR', 'GBP', 'INR'];
    currencies.forEach(curr => {
      const price = data.find(d => d.currency === curr)?.price || 'N/A';
      const card = document.createElement('div');
      card.className = 'currency-card';
      card.innerHTML = `
        <div class="card-currency">${curr}</div>
        <div class="card-price">${price}</div>
      `;
      priceGrid.appendChild(card);
    });

    lastUpdate.textContent = 'Last update: ' + new Date().toLocaleTimeString();
  } catch (err) {
    console.error(err);
    lastUpdate.textContent = 'Failed to fetch prices';
  }
}

// Initial fetch
fetchPrices();
// Auto update every 60s
setInterval(fetchPrices, 60000);
</script>
