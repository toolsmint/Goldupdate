<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Search Console Verification (DON'T TOUCH) -->
<meta name="google-site-verification" content="w-01iFkAzIGGbxIb2nXDW2TESyJYSEu56oQzlH3SCoY" />

<title>Live Gold Price Today (Global) – USD, PKR, EUR + Calculator</title>

<meta name="description" content="Live gold price today worldwide. Check gold rates in USD, PKR, EUR with calculator and live chart.">

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:white; text-align:center; }

header {
  background:linear-gradient(135deg,#bfa43f,#f7d976);
  color:#000;
  padding:30px;
}

.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:30px;
}

.card {
  background:#161616;
  border:1px solid gold;
  padding:20px;
  border-radius:12px;
  width:180px;
}

.price { font-size:22px; color:gold; }

.section {
  background:#111;
  margin:20px auto;
  padding:20px;
  width:90%;
  max-width:900px;
  border-radius:10px;
}

input, select {
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}

button {
  padding:10px 20px;
  background:gold;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#result { margin-top:10px; color:gold; }

footer { padding:20px; color:#aaa; border-top:1px solid gold; }
</style>
</head>

<body>

<header>
<h1>🌍 Live Gold Price Today</h1>
<p>Global gold rates in USD, PKR, EUR + Calculator</p>
<p><strong>Last Updated:</strong> April 2026</p>
</header>

<!-- PRICE -->
<div class="grid" id="grid">Loading...</div>

<!-- CALCULATOR -->
<div class="section">
<h2>Gold Calculator</h2>

<input type="number" id="amount" placeholder="Enter value">

<select id="unit">
  <option value="gram">Gram</option>
  <option value="tola">Tola</option>
</select>

<select id="currency">
  <option value="USD">USD</option>
  <option value="PKR">PKR</option>
  <option value="EUR">EUR</option>
</select>

<br>
<button onclick="calculate()">Calculate</button>

<div id="result"></div>
</div>

<!-- CHART -->
<div class="section">
<div id="tradingview_chart"></div>
</div>

<footer>© 2026 GoldWatch</footer>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
const rates = {
  USD:1,
  PKR:278,
  EUR:0.92
};

let goldPrice = 3200;

// ✅ FIXED API
async function loadGold(){
  try{
    let res = await fetch("https://api.metals.live/v1/spot/gold");
    let data = await res.json();

    if(Array.isArray(data) && data.length > 0){
      goldPrice = data[0][1];
    }

  }catch(e){
    console.log("API error, fallback active");
    goldPrice = 3200;
  }
  render();
}

// RENDER
function render(){
  let html='';
  for(let cur in rates){
    let price = goldPrice * rates[cur];
    html += `
    <div class="card">
      <div>${cur}</div>
      <div class="price">${price.toFixed(2)}</div>
    </div>`;
  }
  document.getElementById("grid").innerHTML = html;
}

// CALCULATOR
function calculate(){
  let amt = document.getElementById("amount").value;
  let unit = document.getElementById("unit").value;
  let cur = document.getElementById("currency").value;

  let gramPrice = goldPrice / 31.1;
  let value = 0;

  if(unit === "gram") value = amt * gramPrice;
  if(unit === "tola") value = amt * (gramPrice * 11.66);

  value = value * rates[cur];

  document.getElementById("result").innerText =
    "Value: " + value.toFixed(2) + " " + cur;
}

// CHART
function loadChart(){
  if(typeof TradingView !== "undefined"){
    new TradingView.widget({
      symbol: "OANDA:XAUUSD",
      interval: "D",
      container_id: "tradingview_chart",
      width: "100%",
      height: 400,
      theme: "dark"
    });
  }
}

window.onload = function(){
  loadGold();
  loadChart();
  setInterval(loadGold,60000);
};
</script>

</body>
</html>
