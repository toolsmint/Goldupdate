<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Gold Price Today Worldwide (USD, PKR, EUR)</title>

<meta name="description" content="Check live gold price today worldwide. Get real-time gold rates in USD, PKR and more.">

<meta name="keywords" content="gold price today, gold rate Pakistan, live gold price, gold price PKR, gold rate worldwide">

<meta name="robots" content="index, follow">

<link rel="canonical" href="https://toolsmint.github.io/Goldupdate/">

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:white; text-align:center; }

header { background:linear-gradient(135deg,#bfa43f,#f7d976); color:#000; padding:30px; }

.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:30px; }

.card {
  background:#161616;
  border:1px solid gold;
  padding:20px;
  border-radius:10px;
  width:170px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(255,215,0,0.3);
}

.price { font-size:22px; color:gold; margin-top:10px; }

#chart { margin:40px auto; width:95%; max-width:900px; }

footer { border-top:1px solid gold; padding:20px; color:#aaa; }
</style>

</head>

<body>

<header>
  <h1>Live Gold Price Today</h1>
  <p>Real-time gold rates worldwide (USD, PKR, EUR)</p>
</header>

<section>
  <h2>Gold Price Today Worldwide</h2>
  <p>Check live gold prices with real-time updates. Track 24K and 22K gold rates easily.</p>
</section>

<div class="grid" id="grid">Loading...</div>

<div id="chart">
  <div id="tradingview_chart"></div>
</div>

<footer>
  © 2026 GoldWatch
</footer>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

const currencies = [
  {code:'USD', symbol:'$', rate:1},
  {code:'PKR', symbol:'Rs', rate:278},
  {code:'EUR', symbol:'€', rate:0.92}
];

async function loadGold() {
  try {
    let res = await fetch("https://api.metals.live/v1/spot/gold");
    let data = await res.json();

    let gold = data[0].gold;

    let html = '';

    currencies.forEach(c => {
      let price = (gold * c.rate).toFixed(2);

      html += `
        <div class="card">
          <div>${c.code} / oz</div>
          <div class="price">${c.symbol}${price}</div>
        </div>
      `;
    });

    document.getElementById("grid").innerHTML = html;

  } catch(e) {
    document.getElementById("grid").innerHTML = "Error loading data";
  }
}

function loadChart(){
  new TradingView.widget({
    symbol: "OANDA:XAUUSD",
    interval: "D",
    container_id: "tradingview_chart",
    width: "100%",
    height: 400,
    theme: "dark"
  });
}

loadGold();
loadChart();
setInterval(loadGold, 60000);

</script>

</body>
</html>
