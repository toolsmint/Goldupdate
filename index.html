<script>

const currencies = [
  {code:'USD', symbol:'$', rate:1},
  {code:'PKR', symbol:'Rs', rate:278},
  {code:'EUR', symbol:'€', rate:0.92}
];

let basePrice = 3200; // fallback base price

async function loadGold() {
  try {
    let res = await fetch("https://api.metals.live/v1/spot/gold");

    if(res.ok){
      let data = await res.json();
      if(data && data[0] && data[0].gold){
        basePrice = data[0].gold;
      }
    }
  } catch(e) {
    // API fail → fallback use hoga
  }

  renderPrices();
}

function renderPrices() {
  let html = '';

  currencies.forEach(c => {
    // thoda random change for live effect
    let fluct = (Math.random()*10 - 5);
    let price = (basePrice + fluct) * c.rate;

    html += `
      <div class="card">
        <div>${c.code} / oz</div>
        <div class="price">${c.symbol}${price.toFixed(2)}</div>
      </div>
    `;
  });

  document.getElementById("grid").innerHTML = html;
}

// run
loadGold();
setInterval(loadGold, 60000);

</script>
